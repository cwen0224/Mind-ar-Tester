<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 1" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0.5" scale="0.5 0.5 0.5" material="color: blue; opacity: 0.8"></a-box>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2">
        <a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3">
        <a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere>
      </a-entity>

    </a-scene>
  </body>
</html>
