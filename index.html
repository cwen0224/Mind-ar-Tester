<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="manifest" href="manifest.json">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      
      /* PWA 安裝提示列 */
      #pwa-install-banner {
        position: fixed; top: 0; left: 0; width: 100%; background: #3498db;
        color: white; padding: 15px; text-align: center; z-index: 5000;
        display: none; cursor: pointer; font-weight: bold;
      }

      #share-btn { position: fixed; top: 60px; right: 20px; z-index: 2000; width: 50px; height: 50px; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; }
      #qr-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; display: none; justify-content: center; align-items: center; flex-direction: column; color: white; }
      #qr-overlay img { width: 250px; height: 250px; border: 10px solid white; border-radius: 10px; margin-bottom: 20px; }
      .ui-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 10px; }
      .zoom-btn { padding: 12px 18px; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; border-radius: 25px; font-size: 14px; }
      #video-container { transition: transform 0.3s ease; transform-origin: center center; }
    </style>
  </head>
  <body>
    <div id="pwa-install-banner" onclick="installPWA()">
      ✨ 點擊此處「安裝 App」享受全螢幕 AR 體驗！
    </div>

    <div id="share-btn" onclick="toggleQR()">📱</div>

    <div id="qr-overlay" onclick="toggleQR()">
      <h3>掃描進入手機 AR 模式</h3>
      <img src="assets/project-qrcode.png" alt="QR Code">
      <p>點擊任意處關閉</p>
    </div>

    <div class="ui-container">
      <button class="zoom-btn" onclick="changeZoom(1)">1x</button>
      <button class="zoom-btn" onclick="changeZoom(1.5)">1.5x</button>
      <button class="zoom-btn" onclick="changeZoom(2)">2x</button>
    </div>

    <div id="video-container">
      <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 1;" color-space="sRGB" renderer="colorManagement: true, antialias: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0"><a-box position="0 0 0.5" scale="0.5 0.5 0.5" material="color: blue; opacity: 0.8"></a-box></a-entity>
        <a-entity mindar-image-target="targetIndex: 1"><a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere></a-entity>
        <a-entity mindar-image-target="targetIndex: 2"><a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere></a-entity>
        <a-entity mindar-image-target="targetIndex: 3"><a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere></a-entity>
      </a-scene>
    </div>

    <script>
      let deferredPrompt;
      const banner = document.getElementById('pwa-install-banner');

      // 監聽是否符合安裝條件 (Android/Chrome 適用)
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        banner.style.display = 'block';
      });

      function installPWA() {
        if (!deferredPrompt) {
          alert('請點擊瀏覽器選單並選擇「加入主畫面」');
          return;
        }
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            banner.style.display = 'none';
          }
          deferredPrompt = null;
        });
      }

      function toggleQR() {
        const overlay = document.getElementById('qr-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
      }

      function changeZoom(level) {
        const container = document.getElementById('video-container');
        container.style.transform = scale();
      }
    </script>
  </body>
</html>
