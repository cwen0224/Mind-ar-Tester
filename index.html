<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="manifest" href="manifest_v2.json">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
      .mindar-ui-overlay, .mindar-ui-loading, .mindar-ui-compatibility, .a-enter-vr, .a-enter-ar { display: none !important; }
      
      #version-tag { position: fixed; top: 15px; left: 15px; z-index: 9999; background: #e74c3c; color: white; padding: 8px 12px; font-size: 14px; border-radius: 5px; font-weight: bold; }
      #share-btn { position: fixed; top: 15px; right: 15px; z-index: 2000; width: 45px; height: 45px; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
      
      #qr-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; justify-content: center; align-items: center; flex-direction: column; color: white; padding: 20px; text-align: center; }
      #qr-overlay img { width: 200px; height: 200px; border: 5px solid white; margin-bottom: 15px; }
      
      .pwa-btn { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; width: 240px; margin-bottom: 10px; }
      #error-log { background: #333; color: #ff7675; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 11px; width: 280px; max-height: 100px; overflow-y: auto; margin-top: 10px; word-break: break-all; }
      .copy-btn { background: #555; color: white; border: 1px solid #777; padding: 5px 10px; font-size: 12px; margin-top: 5px; border-radius: 4px; }

      .ui-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 15px; }
      .zoom-btn { padding: 12px 24px; background: white; color: black; border: none; border-radius: 30px; font-weight: bold; }
      #video-container { transition: transform 0.3s ease; transform-origin: center center; width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="version-tag">VER: 2026.05.12-V8 (Debug Console)</div>

    <div id="share-btn" onclick="toggleQR()">📱</div>

    <div id="qr-overlay">
      <img src="assets/project-qrcode.png" onclick="toggleQR()">
      <button class="pwa-btn" onclick="handlePWA()">安裝 / 更新</button>
      <div id="error-log">初始化中...</div>
      <button class="copy-btn" onclick="copyError()">手動複製錯誤訊息</button>
      <p style="margin-top:15px; font-size:12px; color:#aaa;" onclick="toggleQR()">點擊背景關閉</p>
    </div>

    <div class="ui-container">
      <button class="zoom-btn" onclick="changeZoom(1)">1x</button>
      <button class="zoom-btn" onclick="changeZoom(2)">2x</button>
    </div>

    <div id="video-container">
      <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 1; uiLoading: no; uiScanning: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
          <a-plane position="0 0 0.1" width="1" height="0.4" material="color: #c0392b; opacity: 0.9"></a-plane>
          <a-text value="SPRING COUPLET" position="0 0 0.12" align="center" width="4"></a-text>
        </a-entity>
      </a-scene>
    </div>

    <script>
      const log = document.getElementById('error-log');
      function updateLog(msg) {
        log.innerText = msg;
        console.log(msg);
        // 嘗試自動複製
        navigator.clipboard.writeText(msg).catch(()=>{});
      }

      function copyError() {
        navigator.clipboard.writeText(log.innerText).then(() => alert("已複製到剪貼簿！"));
      }

      // 註冊 SW
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          updateLog("SW OK. State: " + (reg.active ? "Active" : "Waiting"));
        }).catch(err => {
          updateLog("SW Error: " + err.message);
        });
      } else {
        updateLog("瀏覽器不支援 ServiceWorker");
      }

      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        updateLog("PWA 信號已就緒！可以點擊安裝。");
      });

      function handlePWA() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
        } else {
          updateLog("未收到安裝信號 (可能是已安裝或瀏覽器限制)");
          location.reload(true);
        }
      }

      function toggleQR() {
        const overlay = document.getElementById('qr-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
      }

      function changeZoom(level) {
        document.getElementById('video-container').style.transform = scale();
      }

      window.addEventListener('load', () => {
        setTimeout(() => { if(document.getElementById('version-tag')) document.getElementById('version-tag').style.display = 'none'; }, 5000);
      });
    </script>
  </body>
</html>
