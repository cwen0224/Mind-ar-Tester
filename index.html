<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="manifest" href="manifest_v2.json">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
      .mindar-ui-overlay, .mindar-ui-loading, .a-enter-vr, .a-enter-ar { display: none !important; }
      #version-tag { position: fixed; top: 15px; left: 15px; z-index: 9999; background: #2ecc71; color: white; padding: 5px 10px; font-size: 11px; border-radius: 3px; font-weight: bold; }
      #share-btn { position: fixed; top: 15px; right: 15px; z-index: 2000; width: 45px; height: 45px; background: rgba(0,0,0,0.5); color: white; border: 1.5px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
      #qr-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; justify-content: center; align-items: center; flex-direction: column; color: white; }
      #qr-overlay img { width: 220px; height: 220px; border: 4px solid white; margin-bottom: 20px; }
      .pwa-btn { background: #27ae60; color: white; border: none; padding: 15px 25px; border-radius: 8px; font-size: 16px; font-weight: bold; width: 220px; margin-bottom: 10px; }
      .ui-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 15px; }
      .zoom-btn { padding: 12px 24px; background: white; color: black; border: none; border-radius: 30px; font-weight: bold; }
      #video-container { transition: transform 0.2s ease; transform-origin: center center; width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="version-tag">VER: 2026.05.12-V11 (Fix Install Logic)</div>
    <div id="share-btn" onclick="toggleQR()">📱</div>

    <div id="qr-overlay">
      <img src="assets/project-qrcode.png" onclick="toggleQR()">
      <button id="pwa-main-btn" class="pwa-btn" onclick="handlePWA()">檢查中...</button>
      <button class="pwa-btn" style="background:#555; font-size:12px;" onclick="location.reload(true)">僅強制重整</button>
      <p style="margin-top:15px; font-size:12px; color:#aaa;" onclick="toggleQR()">點擊關閉</p>
    </div>

    <div class="ui-container">
      <button class="zoom-btn" onclick="changeZoom(1)">1x</button>
      <button class="zoom-btn" onclick="changeZoom(2)">2x</button>
    </div>

    <div id="video-container">
      <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 1; uiLoading: no; uiScanning: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
          <a-plane position="0 0 0.1" width="1" height="0.4" material="color: #c0392b; opacity: 0.9"></a-plane>
          <a-text value="SPRING COUPLET" position="0 0 0.12" align="center" width="4"></a-text>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 1">
          <a-plane position="0 0 0.1" width="1" height="0.4" material="color: #2c3e50; opacity: 0.9"></a-plane>
          <a-text value="TELEPHONE" position="0 0 0.12" align="center" width="4" color="#f1c40f"></a-text>
        </a-entity>
      </a-scene>
    </div>

    <script>
      let deferredPrompt;
      const mainBtn = document.getElementById('pwa-main-btn');

      // 初始化按鈕文字
      window.addEventListener('load', () => {
        mainBtn.innerText = "檢查更新中...";
        setTimeout(() => { if(!deferredPrompt) mainBtn.innerText = "已是最新版 / 手動更新"; }, 3000);
      });

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        mainBtn.innerText = "立即安裝 App";
        mainBtn.style.background = "#e67e22"; // 變色提醒可安裝
      });

      async function handlePWA() {
        if (deferredPrompt) {
          // 如果可以安裝，執行安裝，且絕對不重整
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            mainBtn.innerText = "安裝中...";
            deferredPrompt = null;
          }
        } else {
          // 如果沒有安裝信號，才執行重整更新
          mainBtn.innerText = "正在更新...";
          location.reload(true);
        }
      }

      function toggleQR() {
        document.getElementById('qr-overlay').style.display = (document.getElementById('qr-overlay').style.display === 'flex') ? 'none' : 'flex';
      }
      function changeZoom(level) {
        document.getElementById('video-container').style.transform = scale();
      }
    </script>
  </body>
</html>
