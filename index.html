<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="manifest" href="manifest_v2.json">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
      .mindar-ui-overlay, .mindar-ui-loading, .mindar-ui-compatibility, .a-enter-vr, .a-enter-ar { display: none !important; }

      #version-tag {
        position: fixed; top: 15px; left: 15px; z-index: 9999;
        background: rgba(255, 0, 0, 0.8); color: white; padding: 5px 10px; 
        font-size: 12px; border-radius: 5px; font-weight: bold;
      }

      #share-btn { position: fixed; top: 15px; right: 15px; z-index: 2000; width: 45px; height: 45px; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
      
      /* QR Code 彈窗優化 */
      #qr-overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.9); z-index: 3000; 
        display: none; justify-content: center; align-items: center; flex-direction: column; color: white; 
      }
      #qr-overlay img { width: 220px; height: 220px; border: 5px solid white; margin-bottom: 20px; }
      
      /* PWA 安裝/更新按鈕 */
      .pwa-btn {
        background: #27ae60; color: white; border: none; padding: 15px 30px;
        border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 220px;
      }

      .ui-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 15px; }
      .zoom-btn { padding: 12px 24px; background: white; color: black; border: none; border-radius: 30px; font-weight: bold; }
      #video-container { transition: transform 0.3s ease; transform-origin: center center; width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="version-tag">VER: 2026.05.12-V3</div>

    <div id="share-btn" onclick="toggleQR()">📱</div>

    <div id="qr-overlay">
      <img src="assets/project-qrcode.png" onclick="toggleQR()">
      <button class="pwa-btn" onclick="handlePWA()">安裝 / 更新 App</button>
      <p style="margin-top:15px; font-size:12px; color:#aaa;" onclick="toggleQR()">點擊背景關閉</p>
    </div>

    <div class="ui-container">
      <button class="zoom-btn" onclick="changeZoom(1)">1x</button>
      <button class="zoom-btn" onclick="changeZoom(1.5)">1.5x</button>
      <button class="zoom-btn" onclick="changeZoom(2)">2x</button>
    </div>

    <div id="video-container">
      <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 1; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, antialias: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0"><a-box position="0 0 0.5" scale="0.5 0.5 0.5" material="color: blue; opacity: 0.8"></a-box></a-entity>
        <a-entity mindar-image-target="targetIndex: 1"><a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere></a-entity>
        <a-entity mindar-image-target="targetIndex: 2"><a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere></a-entity>
        <a-entity mindar-image-target="targetIndex: 3"><a-sphere position="0 0 0.5" radius="0.3" material="color: red"></a-sphere></a-entity>
      </a-scene>
    </div>

    <script>
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
      });

      function handlePWA() {
        // 1. 執行更新：強制重新載入
        if (confirm("即將檢查更新並嘗試安裝，是否繼續？")) {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
              if (choice.outcome === 'accepted') console.log('User accepted');
              deferredPrompt = null;
            });
          } else {
            // iOS 或已安裝的情況
            alert("iOS 用戶請點擊 Safari 分享鈕 >「加入主畫面」。\n已安裝者將自動重整更新。");
            location.reload(true);
          }
        }
      }

      function toggleQR() {
        const overlay = document.getElementById('qr-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
      }

      function changeZoom(level) {
        document.getElementById('video-container').style.transform = scale();
      }

      // 版本號自動隱藏
      window.addEventListener('load', () => {
        setTimeout(() => {
          const tag = document.getElementById('version-tag');
          if(tag) tag.style.display = 'none';
        }, 5000);
      });
    </script>
  </body>
</html>
